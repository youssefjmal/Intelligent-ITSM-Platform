services:
  db:
    image: pgvector/pgvector:pg18
    container_name: jira_pgvector
    environment:
      POSTGRES_DB: jira_tickets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "55632:5432"
    volumes:
      - jira_pgvector_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jira_tickets"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jira_backend
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    command: >
      sh -c "python -m alembic -c alembic.ini upgrade head
      && python -m uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    environment:
      ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/jira_tickets?connect_timeout=10&sslmode=prefer}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your local .env}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jira_frontend
    depends_on:
      - backend
    working_dir: /app
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  jira_pgvector_data:
    external: true
    name: jira_pgvector_data
  frontend_node_modules:
